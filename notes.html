<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            color: #e0e0e0;
            font-family: 'Segoe UI', Consolas, sans-serif;
        }

        #container {
            width: 100%;
            background: rgba(30, 30, 30, 0.97);
            border: 1px solid #555;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }

        #title {
            font-size: 16px;
            font-weight: bold;
            color: #d4a017;
        }

        #close {
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
            opacity: 0.7;
            border-radius: 4px;
        }

        #close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        #notes-content {
            padding: 16px 20px;
            overflow-y: auto;
            max-height: 500px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #notes-content a {
            color: #6cb4ee;
            text-decoration: none;
        }

        #notes-content a:hover {
            text-decoration: underline;
        }

        #empty-state {
            text-align: center;
            opacity: 0.5;
            padding: 40px;
            font-style: italic;
        }

        #hint {
            padding: 8px 16px;
            border-top: 1px solid #333;
            font-size: 11px;
            opacity: 0.5;
            text-align: center;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="header">
            <span id="title">Build Notes</span>
            <span id="close">X</span>
        </div>
        <div id="notes-content">
            <div id="empty-state">No notes found in this build.</div>
        </div>
        <div id="hint">Press the X or Ctrl+Shift+D to close</div>
    </div>

    <script>
        const { ipcRenderer, shell } = require('electron');

        document.getElementById('close').addEventListener('click', () => {
            ipcRenderer.send('hide-notes');
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ipcRenderer.send('hide-notes');
            }
        });

        // Convert URLs in text to clickable links
        function linkify(text) {
            return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1">$1</a>');
        }

        ipcRenderer.on('load-notes', (event, notesText, buildName) => {
            document.getElementById('title').textContent = buildName ? `Notes — ${buildName}` : 'Build Notes';
            const content = document.getElementById('notes-content');
            if (notesText && notesText.trim()) {
                content.innerHTML = linkify(notesText.replace(/</g, '&lt;').replace(/>/g, '&gt;'));
            } else {
                content.innerHTML = '<div id="empty-state">No notes found in this build.</div>';
            }
            // Resize window to fit content
            requestAnimationFrame(() => {
                const height = document.getElementById('container').offsetHeight;
                ipcRenderer.send('resize-notes', height);
            });
        });

        // Open links in external browser instead of Electron
        document.getElementById('notes-content').addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                e.preventDefault();
                shell.openExternal(e.target.href);
            }
        });
    </script>
</body>

</html>
